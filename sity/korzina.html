<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | Finger Noise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cart-page">

    <!-- ФИКСИРОВАННЫЙ БАР -->
    <header class="navbar">
        <div class="navbar-container">
            <div class="logo-area">
                <a href="index.html"><img src="image/logo.png" alt="logo" class="logo-img"></a>
            </div>
            <nav class="menu-area">
                <a href="catalog.html">Каталог</a>
                <a href="about.html">О нас</a>
                <a href="korzina.html" class="active">🛒 (<span id="cart-count">0</span>)</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <h1 class="page-title">ВАША КОРЗИНА</h1>

            <!-- Сетка товаров в корзине -->
            <div id="cart-grid" class="product-grid">
                <!-- Сюда JavaScript вставит товары -->
            </div>

            <!-- Итоговый блок -->
            <div id="cart-footer" class="cart-footer" style="display: none;">
                <div class="total-block">
                    <span>ИТОГО:</span>
                    <span id="total-price">0 ₽</span>
                </div>
                <button class="checkout-btn">Оформить заказ</button>
                <button class="clear-btn" id="clear-cart">Очистить корзину</button>
            </div>

            <!-- Если пусто -->
            <div class="cart-section">
  <h1>ВАША КОРЗИНА</h1>
  <div class="empty-message">
    <p>В корзине пока ничего нет</p>
    <a href="catalog.html" class="back-link style="color: red">Перейти в каталог</a>
  </div>
    </main>

    <script src="cart.js"></script>
</body>
</html>
